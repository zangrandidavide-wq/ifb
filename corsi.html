<!DOCTYPE html>

<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <script type="module" src="corsi.js"></script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Top Navigation Bar -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 lg:px-20 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
                <div id="navbar-placeholder"></div>

                <script type="module" src="navbar.js"></script>
            </header>
            <main class="max-w-7xl mx-auto p-6 pt-24">
                <div class="mb-10 text-center md:text-left">
                    <h1 class="text-4xl font-black text-slate-900 dark:text-white mb-4">Prossimi Allenamenti</h1>
                    <p class="text-slate-500 dark:text-slate-400">Prenota il tuo posto sulla sabbia.</p>
                </div>
                <div
                    class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 mb-8 flex flex-col md:flex-row gap-4 items-end">

                    <div class="flex-1 w-full">
                        <label
                            class="block text-sm font-semibold mb-2 ml-1 text-slate-700 dark:text-slate-300">Livello</label>
                        <select id="filter-level"
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-12 px-4 outline-none focus:border-primary">
                            <option value="">Tutti i livelli</option>
                            <option value="Bas 1">Base 1</option>
                            <option value="Bas 2">Base 2</option>
                            <option value="Int 1">Intermedio 1</option>
                            <option value="Int 2">Intermedio 2</option>
                            <option value="A">Avanzato</option>
                        </select>
                    </div>

                    <div class="flex-1 w-full">
                        <label
                            class="block text-sm font-semibold mb-2 ml-1 text-slate-700 dark:text-slate-300">Coach</label>
                        <select id="filter-coach"
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-12 px-4 outline-none focus:border-primary">
                            <option value="">Tutti i coach</option>
                            <option value="Cappadonna Antonino">Cappadonna Antonino</option>
                            <option value="Lucca Davide">Lucca Davide</option>
                            <option value="Passi Nicolò">Passi Nicolò</option>
                            <option value="Ceccoli Edgardo">Ceccoli Edgardo</option>
                            <option value="Sgro Riccardo">Sgro Riccardo</option>
                            <option value="Mannino Yari">Mannino Yari</option>
                            <option value="Pesce Alessandro">Pesce Alessandro</option>
                            <option value="Zangrandi Davide">Zangrandi Davide</option>
                        </select>
                    </div>

                    <div class="flex-1 w-full">
                        <label
                            class="block text-sm font-semibold mb-2 ml-1 text-slate-700 dark:text-slate-300">Giorno</label>
                        <input type="date" id="filter-date"
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-12 px-4 outline-none focus:border-primary text-slate-500">
                    </div>

                    <div class="flex-1 w-full">
                        <label
                            class="block text-sm font-semibold mb-2 ml-1 text-slate-700 dark:text-slate-300">Genere</label>
                        <select id="filter-gender"
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl h-12 px-4 outline-none focus:border-primary">
                            <option value="">Tutti i generi</option>
                            <option value="M">Maschile</option>
                            <option value="F">Femminile</option>
                            <option value="Mix">Misto</option>
                        </select>
                    </div>

                    <div class="flex gap-2 w-full md:w-auto mt-4 md:mt-0">
                        <button id="btn-filter"
                            class="flex-1 md:flex-none bg-primary hover:bg-primary/90 text-white font-bold h-12 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-sm">search</span> Cerca
                        </button>
                        <button id="btn-reset"
                            class="flex-1 md:flex-none bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-white font-bold h-12 px-6 rounded-xl transition-all">
                            Resetta
                        </button>
                    </div>
                </div>
                <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <p id="courses-loader" class="text-primary font-medium col-span-full text-center">Caricamento
                        palinsesto...</p>
                </div>

                <div class="mt-10 flex justify-center">
                    <button id="load-more-btn"
                        class="hidden px-6 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-900 dark:text-white font-semibold rounded-full transition-all">
                        Mostra allenamenti successivi
                    </button>
                </div>
            </main>
            </main>
            <ifbv-footer></ifbv-footer>
            <script src="footer.js" defer></script>
        </div>
    </div>

    <!-- Custom Modal per avvisi -->
    <div id="custom-modal"
        class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-background-dark/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div
            class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl max-w-sm w-full p-6 text-center transform scale-95 transition-transform duration-300">
            <div id="modal-icon"
                class="w-16 h-16 rounded-full bg-red-100 text-red-600 mx-auto flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-3xl">error</span>
            </div>
            <h3 id="modal-title" class="text-xl font-bold text-slate-900 dark:text-white mb-2">Attenzione</h3>
            <p id="modal-message" class="text-slate-500 dark:text-slate-400 mb-6 text-sm">Messaggio di errore.</p>
            <button id="modal-close-btn"
                class="w-full py-3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-900 dark:text-white font-bold rounded-xl transition-all">Chiudi</button>
        </div>
    </div>

</body>

</html>
